<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%20100'%3E%3Ccircle%20cx='50'%20cy='50'%20r='50'%20fill='%2358cc02'/%3E%3C/svg%3E">
    <title>Vox-Libera - Learn Any Language v2.9</title>
    <link rel="stylesheet" href="style.css?ver=3.3.8">
    <link rel="stylesheet" href="common_style.css?ver=3.3.8">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

    <nav class="top-nav">
        <div class="nav-row">
          <button id="menu-btn" class="menu-btn-icon" onclick="toggleDrawer()">
            <svg class="emoji-icon">
              <use href="#lucide-menu"></use>
            </svg>
          </button>
          <span id="title">Vox-Libera 📖</span>
          <div class="settings-toggle-wrapper">
            <button type="button" id="settingsToggleBtn" class="toolbar-btn gear-btn" onclick="toggleTopSettings()" aria-label="Settings" aria-expanded="false">
              <svg class="emoji-icon">
                <use href="#lucide-settings"></use>
              </svg>
            </button>
            <div id="top-settings-panel" class="top-settings-panel hidden">
              <button type="button" class="toolbar-btn" id="muteBtn" onclick="toggleMute()">
                <svg id="sound-on" class="emoji-icon">
                  <use href="#lucide-volume-2"></use>
                </svg>
                <svg id="sound-off" class="emoji-icon hidden">
                  <use href="#lucide-volume-off"></use>
                </svg>
              </button>
              <button class="toolbar-btn" onclick="changeZoom(-0.1)">
                <svg class="emoji-icon">
                  <use href="#lucide-text-smaller"></use>
                </svg>
              </button>
              <button class="toolbar-btn" onclick="changeZoom(0.1)">
                <svg class="emoji-icon">
                  <use href="#lucide-text-larger"></use>
                </svg>
              </button>
            </div>
          </div>
        </div>
        <div id="searchBar" class="nav-row search-container hidden">
          <input type="text" id="dict-search" oninput="filterDictionary()" data-i18n-placeholder="main|search_hint">
          <button id="clear-search" onclick="clearInput()" class="hidden">×</button>
        </div>
      <div class="nav-content-wrapper">

        <div class="final-progress-bar hidden" id="finalProgress"> </div>

        <div class="progress-container hidden" id="progress-container"><div class="progress-bar" id="progressBar"></div></div>
        <div class="errors-panel hidden" id="errors-panel"><span data-i18n="main|errors-count">Errors: </span><span id="errorCount">0</span></div>
      </div>
    </nav>

    <aside id="drawer" class="drawer">
        <div class="drawer-header">

            <div class="drawer-title">
                <div class="title-row">
                  <h3 id="current-topic-name">Topic Name</h3>

                  <div class="top-actions">
                    <button class="icon-btn" onclick="window.location.reload()" data-i18n-title="menu|reload">
                      <svg class="emoji-icon">
                        <use href="#lucide-reload"></use>
                      </svg>
                    </button>
                    <button class="icon-btn" onclick="" data-i18n-title="menu|close">
                      <svg class="emoji-icon">
                        <use href="#lucide-close"></use>
                      </svg>
                    </button>
                  </div>
                </div>

                  <table class="topic-stats" id="topic-stats-container">
                    <tr><td class="stat-item">
                      <span class="stat-label" data-i18n="menu|words_count">Words:</span>
                      <span class="stat-value" id="statWords">0/0%</span>
                    </td>
                    <td class="stat-item">
                      <span class="stat-label" data-i18n="menu|sent_count">Phrases:</span>
                      <span class="stat-value" id="statSents">0/0%</span>
                    </td></tr>
                  </table>

                <div id="topic-settings">
                    <label class="pass-toggle" data-i18n-title="menu|topic_completed_hint">
                        <input type="checkbox" id="topic-passed-checkbox" onchange="toggleTopicPassed()">
                        <span data-i18n="menu|topic_completed">Topic is completed</span>
                    </label>
                    <button class="btn-reset text-with-icon" onclick="confirmResetTopicStats()" data-i18n-title="menu|reset_topic_stats_hint">
                        <span data-i18n="menu|reset_topic_stats">Reset</span>
                        <svg class="emoji-icon">
                          <use href="#lucide-delete"></use>
                        </svg>
                    </button>
                </div>
                <div class="nav-controls">
                    <button class="nav-pair-button text-with-icon" onclick="prevTopic()">
                      <svg class="emoji-icon">
                        <use href="#lucide-chevron-left"></use>
                      </svg>
                      <span data-i18n="menu|prev_topic">Prev.</span>
                    </button>
                    <button class="nav-pair-button text-with-icon" onclick="nextTopic()">
                      <span data-i18n="menu|next_topic">Next</span>
                      <svg class="emoji-icon">
                        <use href="#lucide-chevron-right"></use>
                      </svg>
                    </button>
                </div>
            </div>
        </div>

        <div class="drawer-content" id="drawer-content">
            <ul id="exercisePath" class="exercise-path"></ul>
        <h3 class="text-with-icon">
          <svg class="emoji-icon">
            <use href="#lucide-settings"></use>
          </svg>
          <span data-i18n="menu|settings">Settings</span>
        </h3>

        <div class="auth-container setting-group">
            <div id="vox-auth-container" class="hidden vox-auth-container">
              <button id="google-login-btn" onclick="handleManualLoginClick()" class="btn-minimal google-login-btn">
                  <svg class="emoji-icon">
                    <use href="#lucide-reload"></use>
                  </svg>
                  Sync with Google
              </button>
            </div>
            <div>
              <label data-i18n="menu|sync_status">Sync status</label>
              <span id="cloud-status" class="cloud-offline">
                <svg class="emoji-icon">
                  <use href="#lucide-offline"></use>
                </svg>
                (offline)
              </span>
            </div>

            <div id="user-profile-block" class="text-with-icon hidden">
              <img id="user-avatar" src="" alt="Avatar">
              <span id="user-name"></span>
              <button onclick="logoutGoogle()" class="nav-pair-button">
                <svg class="emoji-icon">
                  <use href="#lucide-exit"></use>
                </svg>
                Logout
              </button>
            </div>
        </div>

        <div class="setting-group">
          <label data-i18n="menu|difficulty">Difficulty</label>
          <div class="segmented-control" id="difficulty-picker">
              <input type="radio" name="diff" id="diff-easy" value="easy" checked onclick="changeDifficulty('easy')">
              <label for="diff-easy" data-i18n="menu|diff-easy">Easy</label>

              <input type="radio" name="diff" id="diff-medium" value="medium" onclick="changeDifficulty('medium')">
              <label for="diff-medium" data-i18n="menu|diff-medium">Medium</label>

              <input type="radio" name="diff" id="diff-hard" value="hard" onclick="changeDifficulty('hard')">
              <label for="diff-hard" data-i18n="menu|diff-hard">Hard</label>

              <div class="selection-slider"></div>
          </div>
        </div>

        <div class="setting-item">
          <span data-i18n="menu|hide-well-learned">Unlearned only</span>
          <label class="switch">
              <input type="checkbox" id="hide-well-learned" onchange="toggleWellLearned()">
              <span class="slider round"></span>
          </label>
        </div>

        <div class="setting-item">
          <span data-i18n="menu|show-trans-toggle">Transcription</span>
          <label class="switch">
              <input type="checkbox" id="show-trans-toggle" onchange="toggleTranscription()">
              <span class="slider round"></span>
          </label>
        </div>

        <div class="settings-item">
            <label>Interface language:</label>
            <select id="ui-lang-select" class="ui-lang-select settings-select">
            </select>
        </div>

        <h3 class="text-with-icon">
          <svg class="emoji-icon">
            <use href="#lucide-statistics"></use>
          </svg>
          <span data-i18n="menu|statistics">Statistics</span>
        </h3>

        <div class="nav-controls">
            <button class="nav-pair-button text-with-icon" onclick="exportUserData();">
              <svg class="emoji-icon">
                <use href="#lucide-download"></use>
              </svg>
              <span data-i18n="menu|export">Export</span>
            </button>
            <input type="file" id="file-import-input" class="hidden" accept=".json">
            <button class="nav-pair-button text-with-icon" onclick="document.getElementById('file-import-input').click()">
              <svg class="emoji-icon">
                <use href="#lucide-upload"></use>
              </svg>
              <span data-i18n="menu|import">Import</span>
            </button>
        </div>

        <div class="setting-item">
          <span class="btn-reset" onclick="confirmResetStats();">
            <span class="text-with-icon">
              <svg class="emoji-icon">
                <use href="#lucide-delete"></use>
              </svg>
              <span data-i18n="menu|reset-all-stat">Reset all statistics</span>
            </span>
          </span>
        </div>

        <h3 class="text-with-icon">
          <svg class="emoji-icon">
            <use href="#lucide-code"></use>
          </svg>
          <span data-i18n="menu|developer">For developers</span>
        </h3>

        <div class="drawer-footer">

          <div class="setting-item">
            <div id="versions-info"></div>
          </div>

          <a href="https://github.com/freerss2/vox_libera"  target="_blank" class="footer-link github-link text-with-icon">
            <svg class="emoji-icon">
              <use href="#lucide-book"></use>
            </svg>
            Help & Sources
          </a>

          <a href="https://freerss2.github.io/vox_libera/"  target="_blank" class="footer-link github-link text-with-icon">
            <svg class="emoji-icon">
              <use href="#lucide-github"></use>
            </svg>
            Online version
          </a>
        </div>

        <img src="img/vox_libera_qr.png" style="width: 200px;">

      </div>
    </aside>

    <div id="overlay" onclick="toggleDrawer()"></div>

    <main id="app-container">

      <div class="game-screen hidden" id="explanationsScreen">
        <p id="explanationsContent"></p>
        <div id="firstTime" class="hidden">
            <div id="vox-auth-container" class="hidden vox-auth-container">
              <button id="google-login-btn" onclick="handleManualLoginClick()" class="google-login-btn">
                <svg class="emoji-icon">
                  <use href="#lucide-reload"></use>
                </svg>
                Sync with Google
              </button>
            </div>
            <div class="setting-group">
              <label>Interface language:</label>
              <select class="ui-lang-select" id="ui-lang-select"></select>
            </div>
            <button class="action-btn easy" onclick="window.location='index.html'">
              <svg class="emoji-icon">
                <use href="#lucide-book"></use>
              </svg>
              Help
            </button>
        </div>
        <button class="action-btn easy" onclick="loadNextScreen();">
          <span data-i18n="main|go_forward">Ok</span>
          <svg class="emoji-icon">
            <use href="#lucide-chevrons-right"></use>
          </svg>
        </button>
      </div>

      <div id="screen-dictionary" class="game-screen hidden">
        <div id="recap-summary" class="hidden" >
          <div id="recap-title" data-i18n="main|recap_title"></div>
          <div class="on-screen-actions two-button-bar">
            <button class="action-btn easy row-btn full-width" onclick="renderCurrentScreen();">
              <svg class="emoji-icon">
                <use href="#lucide-check"></use>
              </svg>
              <span data-i18n="main|sum-repeat">Repeat</span>
            </button>
            <button class="action-btn easy row-btn full-width" onclick="loadNextScreen();">
              <span data-i18n="main|go_forward">Forward</span>
              <svg class="emoji-icon">
                <use href="#lucide-chevrons-right"></use>
              </svg>
            </button>
          </div>
        </div>

        <div class="next-screen-btn">
          <button class="action-btn easy row-btn full-width on-screen-actions" onclick="loadNextScreen();">
            <span data-i18n="main|go_forward">Forward</span>
            <svg class="emoji-icon">
              <use href="#lucide-chevrons-right"></use>
            </svg>
          </button>
        </div>
        <div id="dictionary-list"></div>
        <div class="next-screen-btn">
          <button class="action-btn easy row-btn full-width on-screen-actions" onclick="loadNextScreen();">
            <span data-i18n="main|go_forward">Forward</span>
            <svg class="emoji-icon">
              <use href="#lucide-chevrons-right"></use>
            </svg>
          </button>
        </div>
      </div>

      <div id="flashcards-screen" class="game-screen flashcards-screen hidden">
        <div id="completion-screen">               
        </div>
        <div id="flashcards-main">
            <div class="flashcard-header">
                <span class="mode-toggle-wrapper">
                  <button class="mode-toggle text-with-icon" onclick="toggleStudyMode()">
                    &nbsp;<svg class="emoji-icon"><use href="#lucide-globe"></use></svg>
                    &nbsp;<svg class="emoji-icon"><use href="#lucide-arrows"></use></svg>
                    &nbsp;<svg class="emoji-icon"><use href="#lucide-user"></use></svg>
                    &nbsp;
                  </button>
                </span>
                <span id="card-counter">1 / ${flashcardsData.length}</span>
                <div class="speed-controls text-with-icon">
                  <button class="mode-toggle" onclick="speakFlashcard()">
                    <svg class="emoji-icon"><use href="#lucide-fast"></use></svg>
                  </button>
                  <svg class="emoji-icon"><use href="#lucide-volume-2"></use></svg>
                  <button class="mode-toggle" onclick="speakFlashcard(1)">
                    <svg class="emoji-icon"><use href="#lucide-slow"></use></svg>
                  </button>
                </div>
            </div>

            <div class="flashcard-wrapper">
                <button class="nav-btn prev" onclick="changeCard(-1)">&Lang;</button>

                <div class="card-container" id="card-anchor">
                    <div class="flashcard" id="card-object" onclick="this.classList.toggle('flipped')">
                        <div class="card-front" id="card-front-content"></div>
                        <div class="card-back" id="card-back-content"></div>
                    </div>
                </div>

                <button class="nav-btn next" onclick="changeCard(1)">&Rang;</button>
            </div>

            <div class="card-controls">
                <button class="action-btn hard" onclick="changeCard(1)">
                  <svg class="emoji-icon">
                    <use href="#lucide-sad"></use>
                  </svg>
                  <span data-i18n="main|card-repeat">Repeat</span>
                </button>
                <button class="action-btn easy" onclick="markAsLearned()">
                  <svg class="emoji-icon">
                    <use href="#lucide-check"></use>
                  </svg>
                  <span data-i18n="main|card-learned">Know it</span>
                </button>
            </div>

        </div>
      </div>

      <div id="screen-matching" class="game-screen hidden">

        <div class="matching-container" id="matching-grid"></div>
        <div id="hint-panel" class="hint-panel transcription" data-i18n="main|hint-panel">Click to see</div>
      </div>

      <div id="screen-quiz" class="game-screen hidden">

        <div class="question-card">
           <div id="quiz-question-container"></div>
           <div id="quiz-main-hint" class="transcription"></div>
        </div>

        <div id="quiz-options-grid" class="options-grid">
        </div>

        <div id="quiz-hint-panel" class="hint-panel transcription">Click to see</div>
        <button class="quiz-giveup-button text-with-icon" onclick="quizGiveup()">
          <svg class="emoji-icon">
            <use href="#lucide-sad"></use>
          </svg>
          <span data-i18n="main|quiz-giveup-button">Give up!</span>
        </button>
      </div>

      <div id="screen-sent" class="game-screen hidden">

        <div class="question-card">
          <div id="sent-question-container"></div>
          <div id="sent-main-hint" class="transcription"></div>
        </div>

        <div class="sent-action-bar">
          <button class="action-btn hard sent-btn-giveup text-with-icon" onclick="giveupSent()">
            <svg class="emoji-icon">
              <use href="#lucide-sad"></use>
            </svg>
            <span data-i18n="main|sent-giveup-btn"> Give up </span>
          </button>
          <button class="action-btn easy sent-btn-check text-with-icon" onclick="checkSent()">
            <svg class="emoji-icon">
              <use href="#lucide-check"></use>
            </svg>
            <span data-i18n="main|check"> Check </span>
          </button>
        </div>

        <div id="sent-result" class="sent-words">
        </div>

        <div id="sent-bank" class="sent-words">
        </div>

      </div>

    </main>

    <div id="narrator-container">
      <div id="speech-bubble" class="hidden">
        <div id="bubble-text">
        </div>
        <div class="bubble-tail"></div>
      </div>

      <div id="narrator-wrapper">
      </div>
    </div>
