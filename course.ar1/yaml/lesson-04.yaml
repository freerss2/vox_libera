sentences:
- en: i love traveling and tourism
  ar: بحب السفر والسياحة
  transliteration: bahibb as-safar was-siyaha
  ru: я люблю путешествия и туризм
- en: where is my passport
  ar: وين جواز سفري
  transliteration: wayn jawaz safari
  ru: где мой паспорт
- en: the tourist is in the hotel
  ar: السائح في الفندق
  transliteration: as-sa'ih fil-funduq
