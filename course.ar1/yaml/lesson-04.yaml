id: hobby_travel_1
name:
  en: Hobbies and travel 1
  ru: Хобби и путешествия 1
explanations:
  en: |
    The word '''بلد''' can be used to mean "country" or "city center."
    Note how the definite article '''ال-''' is used in this lesson.
    Before "solar" letters, it causes the letter to be doubled, but before "lunar" letters, it remains unaltered.
  ru: |
    Слово '''بلد''' может употребляться в значении "страна" или "центр города".
    Обратите внимание как в этом уроке используется определённый артикль '''ال-'''.
    Перед "солнечными" буквами он вызывает удвоение буквы, а перед "лунными" буквами остаётся в чистом виде.
