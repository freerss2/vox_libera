id: everyday_life_1
name:
  en: Everyday life 1
  ru: Быт и обиход 1
explanations:
  en: |
    This lesson will help us describe everyday objects that surround us.
    Note that the **passive voice** is sometimes used to construct **adjectives**.
    The passive voice construction model looks like this:
    [mu-1-2i-3] where 1, 2, and 3 are the letters of the root, for example [munir] '''منير'''
  ru: |
    Этот урок поможет нам описать бытовые предметы окружающие нас в повседневной жизни.
    Обратите внимание на то, что для построения **прилагательного** иногда используется **пассивный залог**.
    Модель построения пассивного залога выглядит так:
    [mu-1-2i-3] где 1, 2 и 3 - буквы корня, например [munir] '''منير'''
story:
  en:
  - ar: كل يوم بفيق بكير وبشرب قهوة.
    en: Every day I wake up early and drink coffee.
    transliteration: Kull yom bafiq bakir wa bashrab qahwa.
  - ar: وين مفاتيح السيارة؟ لازم أروح على الشغل الآن.
    en: Where are the car keys? I must go to work now.
    transliteration: Wayn mafatih as-sayyara? Lazim aruh ala ash-shughl al-an.
  - ar: المفاتيح على الطاولة في المطبخ يا حبيبي.
    en: The keys are on the table in the kitchen, my dear.
    transliteration: Al-mafatih ala at-tawila fil-matbakh ya habibi.
  - ar: شكرا! جاري العزيز كمان بيروح على الشغل بنفس الوقت.
    vocalized: شكراً! جاري العزيز كمان بيروح على الشغل بنفس الوقت.
    en: Thanks! My dear neighbor also goes to work at the same time.
    transliteration: Shukran! Jari al-aziz kaman biruh ala ash-shughl b-nafs al-waqt.
  - ar: بتاكل فطور قبل ما تروح؟
    en: Do you eat breakfast before you go?
    transliteration: Btakul futur qabl ma truh?
  - ar: لا، أنا مش جوعان، بس تعبان شوي.
    en: No, I am not hungry, just a bit tired.
    transliteration: La, ana mish jwan, bas taban shway.
  - ar: الله معك! بشوفك المساء في البيت.
    en: May God be with you! See you in the evening at home.
    transliteration: Alla maak! Bashufak al-masa fil-bayt.
  ru:
  - ar: كل يوم بفيق بكير وبشرب قهوة.
    ru: Каждый день я просыпаюсь рано и пью кофе.
    transliteration: Kull yom bafiq bakir wa bashrab qahwa.
  - ar: وين مفاتيح السيارة؟ لازم أروح على الشغل الآن.
    ru: Где ключи от машины? Мне пора на работу.
    transliteration: Wayn mafatih as-sayyara? Lazim aruh ala ash-shughl al-an.
  - ar: المفاتيح على الطاولة في المطبخ يا حبيبي.
    ru: Ключи лежат на столе на кухне, дорогая.
    transliteration: Al-mafatih ala at-tawila fil-matbakh ya habibi.
  - ar: شكرا! جاري العزيز كمان بيروح على الشغل بنفس الوقت.
    vocalized: شكراً! جاري العزيز كمان بيروح على الشغل بنفس الوقت.
    ru: Спасибо! Моя дорогая соседка тоже ходит на работу в это же время.
    transliteration: Shukran! Jari al-aziz kaman biruh ala ash-shughl b-nafs al-waqt.
  - ar: بتاكل فطور قبل ما تروح؟
    ru: Вы завтракаете перед тем, как идти?
    transliteration: Btakul futur qabl ma truh?
  - ar: لا، أنا مش جوعان، بس تعبان شوي.
    ru: Нет, я не голоден, просто немного устал.
    transliteration: La, ana mish jwan, bas taban shway.
  - ar: الله معك! بشوفك المساء في البيت.
    ru: Да пребудет с вами Бог! Увидимся вечером дома.
    transliteration: Alla maak! Bashufak al-masa fil-bayt.
