id: studying_language_1
name: Studying language 1
explanations:
  en: |
    ### Lesson Objective
    When communicating with a native speaker, we often find it difficult to express ourselves correctly.
    We lack words, we're unsure of our declensions, and our pronunciation isn't perfect.
    This lesson was created to help explain these difficulties.

    ### Conversational nuances
    La-khali '''لحالي''': A very important word. Literally "for yourself," it's used in all contexts when you're doing something alone or independently.

    Ala makhlaq '''على مهلك''': Literally "at your leisure." This is the most natural way to ask someone to stop talking too fast.

    Ashan '''عشان''': Levantine "so that" or "because." In colloquial speech, it's used in every other sentence.

    Sallikh-li '''صلح لي''': "Correct me." It's helpful to say this at the beginning of a conversation with a native speaker so they feel comfortable correcting you.

    At-talfon '''التلفون''': Despite the presence of the word "khatif" (telephone), in 99% of cases people use this borrowing.
  ru: |
    ### Цель урока
    Общаясь с носителем языка мы часто затрудняемся изъясниться правильно.
    Нам не хватает слов, мы неуверенно пользуемся склонениями, наше произношение не идеально.
    Чтобы помочь объяснить такие трудности и был создан этот урок.

    ### Разговорные нюансы
    Ля-хали '''لحالي''': Очень важное слово. Дословно "для себя самого", используется во всех контекстах, когда вы делаете что-то один или самостоятельно.

    Ала махлак '''على مهلك''': Дословно "на твоей неспешности". Это самый естественный способ попросить кого-то не тараторить.

    Ашан '''عشان''': Левантийское "чтобы" или "потому что". В разговорной речи оно звучит в каждом втором предложении.

    Саллих-ли '''صلح لي''': "Исправь мне". Полезно сказать это в начале разговора с носителем, чтобы он не стеснялся вас поправлять.

    Ат-талфон '''التلفون''': Несмотря на наличие слова "хатиф" (телефон), в 99% случаев люди используют именно это заимствование.
story:
  en: |
    ### My path in language (Monologue)
    ##story-line## '''بدأت بدرس اللغة لحالي من سنتين بتطبيق على التلفون. ''' ##story-translation##  I started studying the language on my own two years ago with a phone app. ##story-transcr## Badat badrus al-lugha la-hali min sanatayn bi-tatbiq ala at-talafon.
    ##story-line## '''مرات بنقصني كلمات وقواعدي ضعيفة، وصعب أفهم سماعي. ''' ##story-translation##  Sometimes I lack words and my grammar is weak, and it is hard to understand by ear. ##story-transcr##  Marrat binqusni kalimat wa qawa'idi da'ifa, wa sa'b afham sima'i.
    ##story-line## '''بحاول أقرأ الأخبار عشان أتواصل مع الناس. اللغة بتجمعنا. ''' ##story-translation##  I try to read the news to communicate with people. Language connects us. ##story-transcr##  Bahawal aqra al-akhbar ashan atwasal ma'a an-nas. Al-lugha bitijma'na.

    ### Asking for assistance (Short Dialogue)
    ##story-line## '''لو سمحت، احكي على مهلك. ما فهمت كل شيء. ''' ##story-translation##  Please, speak slower. I did not understand everything. ##story-transcr##  Law samaht, ihki ala mahlak. Ma fahimt kull shi.
    ##story-line## '''كيف لهجتي؟ صلح لي أغلاطي وكيف بنحكي هذه الكلمة صح؟ ''' ##story-translation##  How is my accent? Correct my mistakes and how to say this word correctly? ##story-transcr##  Kayf lahjati? Sallih-li aghlati wa kayf binhki hadhihi al-kalima sah?
    ##story-line## '''لازم أزيد كلماتي. العمر مش حاجز للدراسة! ''' ##story-translation##  I need to expand my vocabulary. Age is not a barrier to study! ##story-transcr##  Lazim azid kalimati. Al-umr mish hajaz lid-dirasa!
