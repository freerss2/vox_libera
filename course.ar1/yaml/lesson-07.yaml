id: names_meaning_1
name:
  en: Names meaning 1
  ru: Значения имён 1
explanations:
  en: |
    ### Teaching Anchor: Proper Names
    Many Arabic names are common adjectives and nouns. Understanding their literal meaning helps you instantly associate a new word with a familiar name (for example, the name Ali means "high/elevated," and Karim means "generous").
  ru: |
    ### Методический якорь: Имена собственные

    Многие арабские имена — это обычные прилагательные и существительные. Понимание их буквального значения помогает мгновенно связать новое слово с уже знакомым именем (например, имя Али означает "высокий/возвышенный", а Карим — "щедрый").
