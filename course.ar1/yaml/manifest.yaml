metadata:
  description: First 300 words and building basic sentences
  level: A0
  prerequisites:
  - Alphabet
  goals:
  - Basic Greetings
  - Simple Sentences
  title:
    en: Arabic Basics
    ru: Основы арабского
target_language: ar
icon_code: ع
feedback:
  perfect:
  - en: Great!
    ar: أَحْسَنْتَ!
    transliteration: Aḥsanta!
    ru: Отлично!
  - en: Perfect!
    ar: مُمْتَاز!
    transliteration: Mumtāz!
    ru: Превосходно!
  - en: Mashallah!
    ar: مَا شَاءَ الله!
    transliteration: Mā shā'a Allāh!
    ru: Машалла!
  good:
  - en: Good job!
    ar: عَمَلٌ جَيِّد!
    transliteration: '''Amalun jayyid!'
    ru: Хорошая работа!
  - en: Well done!
    ar: بَطَل!
    transliteration: Baṭal!
    ru: Молодец!
  tryAgain:
  - en: Try again
    ar: حَاوِلْ مَرَّةً أُخْرَى
    transliteration: Ḥāwil marratan ukhrā
    ru: Попробуй еще раз
  - en: Don't give up!
    ar: لَا تَسْتَسْلِم!
    transliteration: Lā tastaslim!
    ru: Не сдавайся!
