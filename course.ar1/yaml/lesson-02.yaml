- en: she works as a tailor in the workshop
  ar: بتشتغل خياطة في الورشة
  transliteration: bitshataghil khayyata fil-warsha
  ru: она работает портной в мастерской
- en: the student studies at the faculty of arts
  ar: الطالبة بتدرس في كلية الفنون
  transliteration: at-taliba bitadrus fi kulliyat al-funun
  ru: студентка учится на факультете искусств
- en: the mathematician works in the academy
  ar: عالم الرياضيات بيشتغل في الأكاديمية
  transliteration: alim ar-riyadiyat bishataghil fil-akadimiya
