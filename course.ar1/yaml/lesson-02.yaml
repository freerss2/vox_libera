- en: the designer is making a project in the studio
  ar: المصمم بيعمل مشروع في الاستوديو
  transliteration: al-musammim bi'amal mashru fil-ustudiyu
  ru: дизайнер создает проект в студии
- en: the teacher explains the lesson in class
