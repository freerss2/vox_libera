id: work_n_learn_1
name: Professions and studies 1
explanations:
  en: |
    In this lesson, we'll explore job titles, as well as vocabulary related to work and study.
    **Please note:** In colloquial speech, verbs are used with the prefix [be-] '''ب'''.
    Some words may be familiar to us.
    For example:
    [talib] - "student"
    [qumash] - "fabric (qumach)"
    Some words are simply calques: "academy," "cinema."
    The root of the word '''جامعة''' means "gathering," which will be useful when studying words with the same root.
  ru: |
    В этом уроке мы изучаем названия профессий, а также лексику связанную с работой и учёбой.
    **Обратите внимание:** в разговорном языке глаголы употребляются с приставкой [be-] '''ب'''.
    Некоторые слова могут быть нам знакомы.
    Например:
     [talib]  - "студент"
     [qumash] - "ткань (кумач)"
    Некоторые слова - просто калькированы: "академия", "синема".
    Корень слова '''جامعة''' означает "собрание", это пригодится нам при изучении однокоренных слов.
