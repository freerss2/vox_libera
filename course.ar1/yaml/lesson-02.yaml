  transliteration: al-muallim bishrah ad-dars fis-saff
  ru: учитель объясняет урок в классе
- en: i love cinema and art
  ar: بحب السينما والفن
  transliteration: bahibb as-sinima wal-fann
  ru: я люблю кинематограф и искусство
- en: she is sewing a dress from beautiful fabric
  ar: بتخيط فستان من قماش جميل
  transliteration: bitkhayyit fustan min qumash jamil
  ru: она шьет платье из красивой ткани
- en: we study math at the university
  ar: بندرس رياضيات في الجامعة
  transliteration: bandrus riyadiyat fil-jamia
  ru: мы изучаем математику в университете
- en: this workshop is very big
  ar: هذه الورشة كبيرة كثير
  transliteration: hadhihi al-warsha kabira kathir
  ru: эта мастерская очень большая
- en: the student has an exam tomorrow
