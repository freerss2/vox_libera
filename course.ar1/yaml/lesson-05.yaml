id: restaurant_1
name: Restaurant 1
explanations:
  en: |
    ### Usage of some words
    Zaki '''زاكي''': Although this word isn't a literary one, it's precisely this kind of vocabulary that brings people together.

    Suhn '''سخن''': Used for both the weather and food. If the soup is too hot, it's suhn.

    Al-Hilu '''الحلو''': This word (literally "sweet") is more often used for dessert than halva, which can refer to a specific sweet.

    Finjan '''فنجان''': Typically a small cup for coffee. For tea, they often say kasa.

    Al-may '''المي''': This is the most common word for water in the Levant (instead of the classic al-ma).

    Jib '''جيب''': A very useful word for "bring." It's used constantly in restaurants.

    A'tini '''أعطيني''': A polite form of "give me."

    Zaki '''زاكي''': When people say "the restaurant is delicious" (al-mat'am zaki), they mean that the food there is delicious—this is a very popular expression.

    Kawiya '''قوية''': Literally "strong." This is how they say strong coffee.

    ### A little grammar
    Food descriptions are filled with adjectives formed from the passive voice using the pattern [1a-2i-3], where 1, 2, and 3 are the root letters.
    Note the word "halva" - it shares a root with both "sweet" and "dessert."
  ru: |
    ### Особенности употребления некоторых слов
    Заки '''زاكي''': Это слово хоть и не литературное, но именно такая лексика сближает.

    Сухн '''سخن''': Используется и для погоды, и для еды. Если суп слишком горячий — он сухн.

    Аль-Хилю '''الحلو''': Для десерта чаще используют именно это слово (буквально «сладкое»), чем халва, которое может означать конкретную сладость.

    Финжан '''فنجان''': Обычно это маленькая чашечка для кофе. Для чая чаще говорят каса.

    Аль-май '''المي''': Это самое распространенное слово для воды в Леванте (вместо классического аль-ма).

    Джиб '''جيب''': Очень полезное слово «принеси». В ресторане звучит постоянно.

    А'тини '''أعطيني''': Вежливая форма «дай мне».

    Заки '''زاكي''': Когда говорят «ресторан вкусный» (al-mat'am zaki), имеют в виду, что там вкусно готовят — это очень популярный оборот.

    Кавия '''قوية''': Буквально «сильная». Именно так говорят про крепкий кофе.

    ### Немного грамматики
    В описании еды очень много прилагательных образованных из страдательного залога по модели [1a-2i-3] где 1, 2 и 3 - буквы корня.
    Обратите внимание на слово "халва" - оно однокоренное и со словом "сладкий" и "дессерт".
story:
  en: |
    ##story-line## '''بناكل غداء في المطعم اليوم.''' ##story-translation## We eat lunch in the restaurant today. ##story-transcr## Bnakul ghada fil-matam al-yom.

    ##story-line## '''يا جرسون، بدي أشوف الوجبة الرئيسية لو سمحت.''' ##story-translation## Waiter, I want to see the main dish please. ##story-transcr## Ya garson, biddi ashuf al-wajba ar-ra'isiya law samaht.

    ##story-line## '''أنا بطلب دجاج ورز، وهذا هو الطلب تبعي.''' ##story-translation## I order chicken and rice, and this is my order. ##story-transcr## Ana batlub djaj wa ruzz, wa hada huwa at-talab tabai.

    ##story-line## '''بدي بس سلطة وماء، أنا مش جوعان كثير.''' ##story-translation## I just want salad and water, I am not very hungry. ##story-transcr## Biddi bas salata wa mayy, ana mish jwan kathir.

    ##story-line## '''صحتين! الحساب لو سمحت، بدفع وبنمشي.''' ##story-translation## Bon appetit! The bill please, I pay and we leave. ##story-transcr## Sahtein! Al-hisab law samaht, badfa wa bnamshi.
