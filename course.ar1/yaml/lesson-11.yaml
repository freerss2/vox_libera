id: health_1
name:
  en: Health 1
  ru: Здоровье 1
explanations:
  en: |
    ### Short notes about this topic
    Biwja'ni ('''بيوجعني'''): The verb "to be sick" itself is biwja'. But when we talk about ourselves, we add the ending -ni: "my head hurts" (rasi biwja'ni).

    Habba ('''حبة'''): Literally, it's a "grain" or "thing." In pharmacies, it's used to refer to any pill or capsule.

    Istiqbal ('''استقبال'''): A general-purpose word for "reception/meeting." It's used both at a hotel reception and at a hospital reception desk.
  ru: |
    ### Краткие заметки по этой теме
    Биужа'ни ('''بيوجعني'''): Сам глагол «болеть» — biwja'. Но когда мы говорим про себя, мы добавляем окончание -ни: «голова болит меня» (rasi biwja'ni).

    Хабба ('''حبة'''): Дословно это «зернышко» или «штука». В аптеке так называют любую таблетку или капсулу.

    Истикбаль ('''استقبال'''): Универсальное слово «прием/встреча». Используется и как ресепшен в отеле, и как регистратура в больнице.
story:
  en:
  - ar: أنا في الاستقبال في العيادة الآن. راسي بيوجعني وعندي حرارة.
    en: I am at the reception in the clinic now. My head hurts and I have a fever.
    transliteration: Ana fil-istiqbal fil-iyada al-an. Rasi biwja'ni wa indi harara.
  - ar: تفضل هنا، الممرضة مع الدكتور في المستشفى.
    en: Come here please, the nurse is with the doctor in the hospital.
    transliteration: Tafaddal huna, al-mumarriḍa ma'a ad-duktor fil-mustashfa.
  - ar: عندي جرح في الإيد، لازم مرهم وضمادة؟
    en: I have a wound on the hand, do I need an ointment and a bandage?
    transliteration: Indi jurh fil-id, lazim marham wa dimada?
  - ar: نعم، وخذ هذه الحبة لو سمحت. كل شيء تمام.
    en: Yes, and take this pill please. Everything is okay.
    transliteration: Naam, wa khud hadhihi al-habba law samaht. Kull shi tamam.

