id: polite_language_1
name:
  en: Polite language 1
  ru: Вежливые обращения 1
explanations:
  en: |
    ### Lesson Objective
    Arabic politeness is imbued with special expressions that are often not translated literally, but create that very atmosphere of hospitality.

    ### Conversational nuances
    Sakhtein '''صحتين''': A versatile word. It's used both as "to your health" (when someone sneezes or drinks) and as "bon appétit." Literally, it's "two healths."

    Dir balak '''دير بالك''': The most common way to say "be careful" or "take care." The masculine form is balak, and the feminine form is balek.

    Lo samaght '''لو سمحت''': The perfect phrase to politely address a waiter, passerby, or coworker.

    Al-bayt baytak '''البيت بيتك''': Literally, "the house is your home." This is the warmest "make yourself comfortable" one can hear from a host.

    Truh wa tirja bis-salaamah: A beautiful wish for "leaving and returning safely." In colloquial speech, this is the standard "have a safe journey."

    Tafaddal '''تفضل''': A magical word. It is used to invite someone into the house and is said when passing an object or giving up a seat.

    Ala rasi '''على راسي''': Literally, "on my head." A very polite way of saying "I'll do it with pleasure" or "you're welcome."

    Mustahil '''مستحيل''': Literally, "impossible." In Arabic, this is the strongest way to say "absolutely" or "it can't happen."

    Aqeed '''أكيد''': One of the most common words. It replaces "absolutely," "certainly," and "definitely."

    Mumkin '''ممكن''': A universal "maybe" or "possible."

    Mithl al-hazz al-sayyi: Literally, "like bad luck." This is how we convey the meaning of "as luck would have it."
  ru: |
    ### Цель урока
    Арабская вежливость пропитана особыми оборотами, которые часто не переводятся дословно, но создают ту самую атмосферу гостеприимства.

    ### Разговорные нюансы
    Сахтейн '''صحتين''': Универсальное слово. Его говорят и как «на здоровье» (когда кто-то чихнул или выпил), и как «приятного аппетита». Дословно это «два здоровья».

    Дир балак '''دير بالك''': Самый ходовой способ сказать «осторожно» или «береги себя». В мужском роде — balak, в женском — balek.

    Ло самахт '''لو سمحت''': Идеальная фраза, чтобы вежливо обратиться к официанту, прохожему или коллеге.

    Аль-байт байтак '''البيت بيتك''': Дословно «дом — твой дом». Это самое теплое «располагайтесь», которое можно услышать от хозяина.

    Трух ва тирджа бис-саляма: Красивое пожелание «уехать и вернуться в целости». В разговорной речи это стандартное «счастливого пути».

    Тафаддаль '''تفضل''': Магическое слово. Им приглашают войти, его говорят, когда передают предмет, или когда уступают место.

    Аля раси '''على راسي''': Дословно «на моей голове». Очень вежливый способ сказать «сделаю с удовольствием» или «не стоит благодарности».

    Мустахиль '''مستحيل''': Дословно «невозможно». В арабском это самый сильный способ сказать «ни в коем случае» или «этого не может быть».

    Акид '''أكيد''': Одно из самых частотных слов. Оно заменяет и «обязательно», и «конечно», и «точно».

    Мумкин '''ممكن''': Универсальное «может быть» или «возможно».

    Митль аль-хазз ас-саййи: Дословно «как плохая удача». Именно так передается смысл нашего «как назло».
