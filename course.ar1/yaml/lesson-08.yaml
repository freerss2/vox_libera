sentences:
- en: everything is good thank god
  ar: كُلّ شَيْء تَمَام الحَمْدُ لله
  transliteration: kull shi tamam al-hamdu lillah
  ru: всё хорошо слава богу
- en: bon appetit to everyone
  ar: صَحْتَيْن وَعَافْيِة لِلْجَمِيع
  transliteration: sahtayn wa afye lil-jami
  ru: приятного аппетита всем
- en: be careful on the road
  ar: دِير بَالَاك عَلَى الطَّرِيق
  transliteration: dir balak ala t-tariq
  ru: осторожно на дороге
- en: please i want a menu
  ar: لَوْ سَمَحْت بَدِّي المِنْيُو
  transliteration: law samaht biddi l-minyu
  ru: будьте добры я хочу меню
- en: nice to meet you my friend
  ar: فُرْصَة سَعِيدَة يَا صَاحْبِي
  transliteration: fursa sa'ida ya sahbi
  ru: приятно познакомиться мой друг
- en: unfortunately i can not come today
  ar: لِلْأَسَف مَا بَقْدِر أَجِي اليَوْم
  transliteration: lil-asaf ma baqdar aji l-yom
  ru: к сожалению не могу прийти сегодня
- en: i wish you luck in work
  ar: بَتْمَنَّى لَاك التَّوْفِيق فِي الشُّغْل
  transliteration: batmanna lak at-tawfiq fi sh-shughl
  ru: желаю тебе удачи в работе
- en: no god forbid
  ar: لَا لَا سَمَحَ الله
  transliteration: la la samah allah
  ru: нет не дай бог
- en: welcome to our house
  ar: أهْلًا وَسَهْلًا فِي بَيْتْنَا
  transliteration: ahlan wa sahlan fi baytna
  ru: добро пожаловать в наш дом
- en: make yourself at home my friend
  ar: البَيْت بَيْتَاك يَا صَاحْبِي
  transliteration: al-bayt baytak ya sahbi
  ru: располагайтесь мой друг
- en: have a safe trip to russia
  ar: تْرُوح وَتِرْجَع بِالسَّلَامِة لَرُوسْيَا
  transliteration: truh wa tirja bis-salame la-rusiya
  ru: счастливого пути в Россию
- en: do not worry about the money
  ar: مَا فِي دَاعِي لِلْقَلَق عَن المَصَارِي
  transliteration: ma fi da'i lil-qalaq an al-masari
  ru: не стоит беспокоиться о деньгах
- en: please sit here
  ar: تَفَضَّل اِقْعُد هُون
  transliteration: tafaddal iq'ud hon
  ru: пожалуйста садись здесь
- en: it is not a problem never mind
  ar: مُش مُشْكِلِة مَعْلِش
  transliteration: mish mushkile ma'lesh
  ru: это не проблема ничего страшного
- en: congratulations on the new job
  ar: مَبْرُوك عَلَى الشُّغْل جْـدِيد
  transliteration: mabruk ala sh-shughl j-did
  ru: поздравляю с новой работой
- en: it is my pleasure no need to thank
  ar: عَلَى رَاسِي وَلَا يْهِمَّاك
  transliteration: ala rasi wala yhimmak
  ru: не стоит благодарности мне в радость
- en: as luck would have it the bus is late
  ar: مِثْل الحَظّ السَّيِّء البَاص مُتَأَخِّر
  transliteration: mitl al-hazz as-sayyi l-bas mut'akhkhir
  ru: как назло автобус опаздывает
- en: fortunately the passport is here
  ar: مِن حُسْن الحَظّ الجَوَاز هُون
  transliteration: min husn al-hazz al-jawaz hon
  ru: к счастью паспорт здесь
- en: no way this is impossible
  ar: مُسْتَحِيل هَادَا مُش مُمْكِن
  transliteration: mustahil hada mish mumkin
  ru: ни в коем случае это невозможно
- en: i will definitely come today
  ar: أَكِيد بَجِي اليَوْم
  transliteration: akid baji l-yom
  ru: я обязательно приду сегодня
- en: maybe the coffee is hot
  ar: مُمْكِن القَهْوِة سُخْنِة
  transliteration: mumkin al-qahwe sukhne
  ru: возможно кофе горячий
- en: definitely the food is tasty
  ar: أَكِيد الأَكْل زَاكِي
  transliteration: akid al-akl zaki
  ru: обязательно еда вкусная
- en: as luck would have it the city is far
  ar: مِثْل الحَظّ السَّيِّء البَلَد بَعِيدِة
  transliteration: mitl al-hazz as-sayyi l-balad ba'ide
  ru: как назло город далеко
- en: fortunately the hotel is clean
  ar: مِن حُسْن الحَظّ الفُنْدُق نَظِيف
  transliteration: min husn al-hazz al-funduq nazif
  ru: к счастью гостиница чистая
