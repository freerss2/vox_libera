id: filling_the_gaps
name:
  en: Filling the Gaps
  ru: Полезные мелочи
explanations:
  en: |
    ### Important notes about this topic

    Сottage cheese: Arabic cuisine doesn't have a complete equivalent to cottage cheese. They typically use either qarisha (a cheese product) or white soft cheeses like jibna bida (white cheese).

    Waiter (Jarson): This word comes from French (garçon) and has become firmly established in the Arabic dialect.

    Colors (Gender): Note: "blue" is azraq, but "blue paper" is waraqa zarqa. Colors in Arabic have specific masculine and feminine genders, so take this into account in sentences.

    Dughri ('''دغري'''): Perhaps the most popular word for directions. It comes from Turkish, but Arabic is indispensable.

    Ittafaqna ('''اتفقنا'''): A verb in the past tense ("we agreed"), but used specifically as "OK, it's done."

    Bid-dabt ('''بالضبط'''): Note the transcription—the letter "Dad" produces a heavy "d" sound, almost turning into a "z" in some dialects, but "d" is standard here.
  ru: |
    ### Важные замечания по поводу этой темы

    Творог: В арабской кухне нет полного аналога нашего рассыпчатого творога. Обычно используют либо qarisha (творожный продукт), либо белые мягкие сыры типа jibna bida (белый сыр).

    Официант (Jarson): Это слово пришло из французского (garçon) и прочно закрепилось в арабском диалекте.

    Цвета (Род). Обратите внимание: «синий» — azraq, но «синяя бумага» — waraqa zarqa. У цветов в арабском мужской и женский род образуются специфически, учтите это в предложениях.

    Dughri ('''دغري'''): Пожалуй, самое популярное слово для указания пути. Оно пришло из турецкого, но в арабском без него никуда.

    Ittafaqna ('''اتفقنا'''): Глагол в прошедшем времени («мы договорились»), но используется именно как «ОК, идёт, по рукам».

    Bid-dabt ('''بالضبط'''): Обратите внимание на транскрипцию — буква «Дад» дает тяжелый звук «д», почти переходящий в «з» в некоторых диалектах, но «d» здесь — стандарт.
story:
  en:
  - ar: لو سمحت يا جرسون، وين طلبنا؟
    en: Please waiter, where is our order?
    transliteration: Law samaht ya jarson, wayn talabna?
  - ar: الشرشف بنفسجي والمحرمة زرقاء، كل شيء جميل هنا.
    en: The tablecloth is purple and the napkin is blue, everything is beautiful here.
    transliteration: Ash-sharshaf banafsaji wal-mahrameh zarqa, kull shi jamil huna.
  - ar: بدي دجاج مسلوق وسلطة مع زيت زيتون ولبنة.
    en: I want boiled chicken and a salad with olive oil and sour cream.
    transliteration: Biddi djaj masluq wa salata ma'a zayt zaytun wa labneh.
  - ar: ممكن تطبع هذا المستند على ورقة رمادية؟
    en: Can you print this document on a grey paper?
    transliteration: Mumkin titba' hadha al-mustanad ala waraqa ramadiya?
  - ar: وين الفندق؟ هو بعيد من هنا؟
    en: Where is the hotel? Is it far from here?
    transliteration: Wayn al-funduq? Huwa ba'id min huna?
  - ar: لا، امشي دغري، الفندق على الزاوية بعد الإشارة الضوئية.
    en: No, go straight, the hotel is around the corner after the traffic light.
    transliteration: La, imshi dughri, al-funduq ala az-zawiya ba'd al-ishara daw'iya.
  - ar: تمام، هذا بالضبط شو بدي. شكرا!
    vocalized: تمام، هذا بالضبط شو بدي. شكراً!
    en: Okay, this is exactly what I want. Thanks!
    transliteration: Tamam, hadha bid-dabt shu biddi. Shukran!
  - ar: عفوا! اتفقنا، يوم سعيد.
    vocalized: عفواً! اتفقنا، يوم سعيد.
    en: You're welcome! Agreed, have a happy day.
    transliteration: Afwan! Ittafaqna, yawm sa'id.
