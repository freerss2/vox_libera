id: training_1
name:
  en: Practice the Learned
  ru: Тренируем Выученное
explanations:
  en: |
    ### This lesson is designed to consolidate what has been learned.
    Here you'll find exercises that practice grammar and memorize words that are similar in meaning or different variations of the same root.
    Like flashcards, these exercises don't award success percentages.
    The goal is to practice independently in the game format, but without the risk of losing winning points.
  ru: |
    ### Этот урок предназначен для закрепления изученного.
    Тут собраны упражнения, тренирующие знания грамматики и запоминание слов, схожих по смыслу или различные вариации от того же корня.
    Как и в карточках слов, за такие упражнения не начисляются проценты успеха.
    Цель - самостоятельная тренировка в фомате игры, но без угрозы потерять выигрышные баллы.
