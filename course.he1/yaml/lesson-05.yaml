id: pronominal_prepositions_1
name:
  en: Pronominal prepositions 1
  ru: Местоимённые предлоги 1
explanations:
  en: |
    ### Preposition "With" ('''עם''')
    Hebrew has a peculiarity: when suffixes are added to the preposition im (with), it often turns into the form it- (iti, itkha). This is important to remember, as the root changes.

    ### Preposition "On" ('''על''')
    In Hebrew, it often replaces the preposition "o" (to think of someone = to think of someone, khoshev al).

    ### Accusative case ('''את'''):
    Remember that oti/otkha is only used when we know who is being referred to. The verbs "to see" (ro'e) and "to love" (ohev) always require this form.
  ru: |
    ### Предлог «С» ('''עם''')
    В иврите есть особенность — когда к предлогу im (с) добавляются суффиксы, он часто превращается в форму it- (iti, itkha). Это важно для запоминания, так как корень меняется.

    ### Предлог «НА» ('''על''')
    В иврите он часто заменяет предлог «о» (думать о ком-то = думать на кого-то, khoshev al).

    ### Винительный падеж ('''את''')
    Помни, что oti/otkha используется только тогда, когда мы знаем, о ком речь. Глаголы «видеть» (ro'e) и «любить» (ohev) всегда требуют этой формы.
