sentences:
- en: do you want to go with me?
  he: אתה רוצה ללכת איתי?
  transliteration: ata rotze lalekhet iti?
  ru: ты хочешь пойти со мной?
- en: i love you
  he: אני אוהב אותך
  transliteration: ani ohev otkha
  ru: я люблю тебя
- en: everything is on me
  he: הכל עלי
  transliteration: ha-kol alay
  ru: всё на мне
- en: he is speaking with you now
  he: הוא מדבר איתך עכשיו
  transliteration: hu medaber itkha akhshav
  ru: он говорит с тобой сейчас
- en: i see you
  he: אני רואה אותך
  transliteration: ani ro'e otkha
  ru: я вижу тебя
- en: what is in it?
  he: מה יש בו?
  transliteration: ma yesh bo?
  ru: что в нем?
- en: he is thinking about us
  he: הוא חושב עלינו
  transliteration: hu khoshev alenu
  ru: он думает о нас
- en: do you understand me?
  he: אתה מבין אותי?
  transliteration: ata mevin oti?
  ru: ты понимаешь меня?
- en: wait for me a minute
  he: חכה לי דקה
  transliteration: khake li daka
  ru: подожди меня минуту
- en: i am with you
  he: אני איתך
  transliteration: ani itkha
  ru: я с тобой
