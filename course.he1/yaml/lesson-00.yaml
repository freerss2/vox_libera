id: all
name: All topics
explanations:
  en: |
    ### The First 200 Words and Basic Sentence Constructions
    The course aims to develop a stable **basic vocabulary** necessary for everyday communication and understanding of everyday speech.

    The course is designed for students at levels **A0-A1** who are already familiar with the alphabet and reading rules.
    However, to reinforce reading skills, the course has been supplemented with lessons entirely devoted to the alphabet.
    The curriculum and course texts are structured using **artificial intelligence** technologies, which allowed us to select the most relevant and frequently used language structures.

    ### Update 2026-04-22
    Added new lesson "Pronominal prepositions 1"

    ### Update 2026-04-24
    Added new lesson "ABC 1"
  ru: |
    ### Первые 200 слов и базовые конструкции предложения.
    Цель курса — сформировать устойчивый **базовый лексикон**, необходимый для повседневного общения и понимания обиходной речи.

    Курс ориентирован на учащихся уровня **A0-A1**, уже знакомых с алфавитом и правилами чтения.
    Тем не менее, для закрепления навыка чтения в курс добавлены уроки полностью посвящённые алфавиту.
    Программа и учебные тексты структурированы с применением технологий **искусственного интеллекта**, что позволило отобрать наиболее актуальные и частотные языковые конструкции.

    ### Обновление 2026-04-22
    Добавлен новый урок "Местоимённые предлоги 1"

    ### Обновление 2026-04-24
    Добавлен новый урок "Алфавит 1я часть"
