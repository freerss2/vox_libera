id: abc_1
name:
  en: ABC 1
  ru: Алфавит 1я часть
explanations:
  en: |
    ### A little about the language
    The history of Hebrew as a language begins over 3,000 years ago. Hebrew is a Semitic language and is written from right to left. The letterforms and alphabetic composition are similar to those of other ancient languages ​​from the Middle East and Mediterranean regions. Modern scripts differ from the ancient versions, but the rules for reading remain unchanged. The pronunciation does not contain any exotic sounds, unless you intend to imitate traditional accents.
  ru: |
    ### Немного о языке
    История иврита как языка начинается более 3000 лет тому назад. Иврит относится к семитским языкам и использует написание справа налево. Начертание букв и состав алфавита сходны с другими древними языками из ближневосточного и средиземноморского регионов. Современное начертание отличается от древних вариантов, но правила чтения остались неизменными.  Фонетика не содержит экзотических звуков, если только вы не собираетесь имитировать традиционные акценты.
