<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" />
    <title>Vox-Libera - Learn Any Language v2.8</title>
    <script>
      const html_code_ver = '2.8.4';
    </script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="common_style.css">

</head>
<body>

    <main id="app-container">

      <div class="" id="aboutScreen">
        <h2 data-i18n="main|app-name"> </h2>
        
        <h2 id="aboutTitle"></h2>
        <div class="course-selector">

          <button data-i18n="main|user-guide" class="course-btn" onclick="location.href='user_guide.html'">User Guide</button>

          <button data-i18n="main|documentation" class="course-btn" onclick="location.href='https://github.com/freerss2/vox_libera/blob/main/README.md'">Technical Documentation</button>
            
        <!-- buttons with links to supported courses -->
          <button class="course-btn" onclick="location.href='course.ar1.html'">Learn Arabic #1</button>
          <button class="course-btn" onclick="location.href='course.he1.html'">Learn Hebrew #1</button>
        </div>
      </div>

    </main>

    <div id="narrator-container">
      <div id="speech-bubble" class="hidden">
        <div id="bubble-text">
            </div>
        <div class="bubble-tail"></div>
      </div>

      <div id="mascot-wrapper">
      </div>
    </div>

    <script src="js/common.js?ver=2-7" defer></script>
    <script src="js/settings.js?ver=2-7" defer></script>
    <script src="js/i18n.js?ver=2-7" defer></script>
    <script src="js/locales.js?ver=2-7" defer></script>
    <script src="js/main.js?ver=2-7" defer></script>
