<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%20100'%3E%3Ccircle%20cx='50'%20cy='50'%20r='50'%20fill='%2358cc02'/%3E%3C/svg%3E">
    <title>Vox-Libera - Arabic Lessons v2.5</title>
    <script>
      const html_code_ver = '2.6.0';
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="top-nav">
        <div class="nav-row">
          <button id="menuBtn" style="font-size: larger;" onclick="toggleDrawer()">☰</button>
          <span id="title">Vox-Libera 📖</span>
          <button class="toolbarBtn" id="muteBtn" onclick="toggleMute()">🔊</button>
          <button class="toolbarBtn" onclick="changeZoom(-0.1)">A-</button>
          <button class="toolbarBtn" onclick="changeZoom(0.1)">A+</button>
        </div>
        <div id="searchBar" class="nav-row search-container" style="display: none; padding: 5px 10px; background: #fdfdfd;">
          <input type="text" id="dictSearch" oninput="filterDictionary()" placeholder="Поиск слова..." style="min-width: 300px; padding: 8px; border-radius: 6px; border: 1px solid #ccc;">
          <button id="clearSearch" onclick="clearInput()" style="display:none;">×</button>
        </div>
      <div class="nav-content-wrapper">
        <div class="progress-container" id="progress-container"><div class="progress-bar" id="progressBar"></div></div>
        <div class="errors-panel" id="errors-panel">Ошибки: <span id="errorCount">0</span></div>
      </div>
    </nav>

    <aside id="drawer" class="drawer">
        <div class="drawer-header">

            <div class="drawer-title">
                <div class="title-row">
                  <h3 id="currentTopicName">Название темы</h3>

                  <div class="top-actions">
                    <button class="icon-btn" onclick="window.location.reload()" title="Перезагрузить">↻</button>
                    <button class="icon-btn" onclick="" title="Закрыть">✕</button>
                  </div>
                </div>

                  <table class="topic-stats" id="topicStatsContainer">
                    <tr><td class="stat-item">
                      <span class="stat-label">Слов:</span> 
                      <span class="stat-value" id="statWords">0/0%</span>
                    </td>
                    <td class="stat-item">
                      <span class="stat-label">Фраз:</span> 
                      <span class="stat-value" id="statSents">0/0%</span>
                    </td></tr>
                  </table>

                <div id="topic-settings">
                    <label class="pass-toggle" title="Включить тему в финальный раунд">
                        <input type="checkbox" id="topicPassedCheckbox" onchange="toggleTopicPassed()">
                        <span>Тема пройдена</span>
                    </label>
                    <button class="btn-reset" onclick="resetTopicStats()" title="Сбросить прогресс упражнений">
                        Сбросить 🗑️
                    </button>
                </div>
                <div class="nav-controls">
                    <button class="nav-arrow" onclick="prevTopic()">❮ Пред.</button>
                    <button class="nav-arrow" onclick="nextTopic()">След. ❯</button>
                </div>
            </div>
        </div>

        <div class="drawer-content" id="drawer-content">
            <ul id="exercisePath" class="exercise-path"></ul>
        <h3>🛠 Настройки</h3>

        <div class="setting-group">
          <label>Сложность</label>
          <div class="segmented-control" id="difficulty-picker">
              <input type="radio" name="diff" id="diff-easy" value="easy" checked onclick="changeDifficulty('easy')">
              <label for="diff-easy">Легко</label>

              <input type="radio" name="diff" id="diff-medium" value="medium" onclick="changeDifficulty('medium')">
              <label for="diff-medium">Средне</label>

              <input type="radio" name="diff" id="diff-hard" value="hard" onclick="changeDifficulty('hard')">
              <label for="diff-hard">Сложно</label>

              <div class="selection-slider"></div>
          </div>
        </div>

        <div class="setting-item">
          <span>Только невыученное</span>
          <label class="switch">
              <input type="checkbox" id="hide-well-learned" onchange="toggleWellLearned()">
              <span class="slider round"></span>
          </label>
        </div>

        <div class="setting-item">
          <span>Транскрипция</span>
          <label class="switch">
              <input type="checkbox" id="show-trans-toggle" onchange="toggleTranscription()">
              <span class="slider round"></span>
          </label>
        </div>

        <div class="setting-item">
          <span class="action-btn hard" onclick="resetStats()">
              <span>🗑️ Сбросить статистику</span>
          </span>
        </div>

        <div class="setting-item">
          <div id="versions-info"></div>
        </div>

<div class="drawer-footer">
    <a href="https://github.com/freerss2/vox_libera" 
       target="_blank" class="footer-link github-link">
       <span>❓</span> Help & Sources
    </a>

    <a href="https://freerss2.github.io/vox_libera/" 
       target="_blank" class="footer-link github-link">
       <svg viewBox="0 0 16 16" width="16" height="16"><path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>
       Online version
    </a>
</div>


      </div>
    </aside>

    <div id="overlay" onclick="toggleDrawer()"></div>

    <main id="app-container">
      <div id="screen-dictionary" class="game-screen" style="display: none; padding-bottom: 40px;">
        <button class="action-btn easy row-btn" onclick="loadNextScreen();" style="width: 100%;">ВПЕРЁД ▶▶</button>
        <div id="dictionaryList"></div>
        <button class="action-btn easy row-btn" onclick="loadNextScreen();" style="width: 100%;">ВПЕРЁД ▶▶</button>
      </div>

      <div id="flashcards-screen" class="game-screen flashcards-screen">
      </div>

      <div id="screen-matching" class="game-screen" style="display: none;">

        <div class="matching-container" id="matching-grid"></div>
        <div id="hint-panel" class="hint-panel transcription">Нажми на арабское слово</div>
      </div>

      <div class="win-screen" id="winScreen">
        <h1 id="winStatus">Ахсанта!</h1>
        <div id="accuracyStat">100%</div>
        <div>
          <button class="action-btn easy" onclick="startScreen()">✔ ПОВТОРИТЬ</button>
          <button class="action-btn easy" onclick="loadNextScreen()">ДАЛЬШЕ ▶▶</button>
        </div>
      </div>

      <div id="screen-quiz" class="game-screen" style="display: none;">

        <div class="question-card">
           <div id="quiz-question-container"></div>
           <div id="quiz-main-hint" class="transcription"></div>
        </div>

        <div id="quiz-options-grid" class="options-grid">
        </div>

        <div id="quiz-hint-panel" class="hint-panel transcription">Нажми на арабское слово</div>
      </div>

      <div id="screen-sent" class="game-screen" style="display: none;">

        <div class="question-card">
          <div id="sent-question-container"></div>
          <div id="sent-main-hint" class="transcription"></div>
        </div>

        <button class="action-btn easy" style="width:100%;" onclick="checkSent()">☝  Проверить 👇</button>

        <div id="sent-result" class="sent-words">
        </div>

        <div id="sent-bank" class="sent-words">
        </div>

      </div>

    </main>


    <script src="settings.js?ver=2-5" defer></script>
    <script src="i18n.js?ver=2-5" defer></script>
    <script src="lessons.js?ver=2-5" defer></script>
    <script src="app.js?ver=2-5" defer></script>

</body>
</html>
